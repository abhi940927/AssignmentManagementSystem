<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Assignment - EduFlow</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <span class="material-symbols-outlined">menu</span>
            <span class="material-symbols-outlined ml-2 text-primary">school</span>
            EduFlow
        </div>
        <div class="navbar-links">
            <a href="student-dashboard.html" class="nav-link">Dashboard</a>
            <a href="my-assignments.html" class="nav-link">Assignments</a>
        </div>
        <div class="navbar-right">
            <div class="avatar avatar-sm border border-[var(--outline-variant)]" id="nav-avatar">S</div>
            <button class="theme-toggle btn-icon" id="theme-toggle">
                <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
            </button>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar border-r border-[var(--surface-container-high)]">
        <div class="sidebar-header">
            <div class="sidebar-label mb-1">Academic Portal</div>
            <div class="text-xs text-muted font-medium">Student View</div>
        </div>
        <nav class="sidebar-nav">
            <a href="student-dashboard.html" class="sidebar-item">
                <span class="material-symbols-outlined">dashboard</span>
                <span>Dashboard</span>
            </a>
            <a href="my-assignments.html" class="sidebar-item">
                <span class="material-symbols-outlined">collections_bookmark</span>
                <span>My Assignments</span>
            </a>
            <a href="submit-assignment.html" class="sidebar-item active">
                <span class="material-symbols-outlined">publish</span>
                <span>Submissions</span>
            </a>
            <a href="grades-feedback.html" class="sidebar-item">
                <span class="material-symbols-outlined">analytics</span>
                <span>Grades & Feedback</span>
            </a>
        </nav>
        <div class="sidebar-footer mt-auto">
            <div class="avatar avatar-sm" id="sidebar-avatar">S</div>
            <div class="flex-1 overflow-hidden">
                <div class="font-bold text-sm truncate" id="sidebar-name">Student</div>
                <div class="text-xs text-muted truncate" id="sidebar-email">student@edu.org</div>
            </div>
            <span class="material-symbols-outlined text-muted cursor-pointer hover:text-error" id="logout-btn">logout</span>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <div class="text-center p-12 text-muted">Loading assignment...</div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/submit.js"></script>
</body>
</html>
